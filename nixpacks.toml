[phases.setup]
nixPkgs = ["...", "nodejs_22"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci --include=dev",
    "npm run build"
]

[start]
cmd = "php artisan config:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT}"
